version: '3.8'

services:
  signalling:
    build:
      context: .
      dockerfile: Dockerfile.signalling
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - signalling-network

