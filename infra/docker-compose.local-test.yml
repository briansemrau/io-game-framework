services:
  signalling-server:
    container_name: signalling-server
    # build:
    #   context: .
    #   dockerfile: Dockerfile.signalling
    image: signalling-server:latest
    ports:
      - "9812:8080"
    environment:
      - LOG_LEVEL=info
    networks:
      - service-network

  game-server:
    container_name: game-server
    # build:
    #   context: .
    #   dockerfile: Dockerfile.game-server
    #   args:
    #     - BUILD_TYPE=Debug
    image: game-server:latest
    environment:
      - SIGNALING_URL=signalling-server:8080
    depends_on:
      - signalling-server
    networks:
      - service-network

networks:
  service-network:
    driver: bridge